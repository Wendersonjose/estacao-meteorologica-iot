# ============================================================
# Mosquitto LOCAL com ponte (bridge) para o HiveMQ Cloud
# Teste do requisito 3.2 — broker local conectado ao broker na nuvem
#
# Uso:
#   1. Copie este arquivo para mosquitto-bridge.conf
#   2. Preencha usuário/senha do HiveMQ Cloud
#   3. Baixe o certificado raiz: https://letsencrypt.org/certs/isrgrootx1.pem
#   4. Rode: mosquitto -c mosquitto-bridge.conf -v
# ============================================================

# Broker local escuta na porta 1884 (sem TLS, apenas localhost)
listener 1884 localhost
allow_anonymous true

# Log detalhado para evidenciar a conexão da ponte
log_type all

# ----- PONTE PARA O HIVEMQ CLOUD -----
connection ponte-hivemq-cloud
address SEU_BROKER.s1.eu.hivemq.cloud:8883
remote_clientid ponte-local-01
bridge_protocol_version mqttv311
remote_username SEU_USUARIO
remote_password SUA_SENHA
bridge_cafile isrgrootx1.pem
bridge_tls_version tlsv1.2

# Replica os tópicos do projeto nos dois sentidos
topic clima/# both 0
topic alertas/# both 1

notifications false
cleansession true
try_private false
